<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Il Nostro Staff - Autoscuola Russo</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;800&display=swap" rel="stylesheet">
<style>
body {margin:0;font-family:'Poppins',sans-serif;background:#f9f9f9;color:#333;}
header {background:linear-gradient(90deg,orange,limegreen);color:white;text-align:center;padding:70px 20px;}
section {padding:60px 20px;text-align:center;}
.staff-container {display:flex;flex-wrap:wrap;justify-content:center;gap:30px;}
.card {
    background:white;
    width:260px;
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
    transition:0.4s;
}
.card:hover {transform:translateY(-10px);}
.card img {
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:15px;
}
h2 {color:orange;}
.fade {opacity:0;transform:translateY(30px);transition:0.8s;}
.fade.show {opacity:1;transform:translateY(0);}
</style>
</head>
<body>

<header>
<h1>Il Nostro Staff</h1>
<p>Professionali, preparati… e simpatici 😎</p>
</header>

<section class="fade">
<h2>Chi ti accompagnerà fino alla patente</h2>

<div class="staff-container">

<div class="card">
<img src="foto-istruttore1.jpg" alt="Insegnanti e Istruttori">
<h3>Riccardo, Raffaella, Irene e Luana</h3>
<p>Ci troverai in aula per le teorie e poi in auto e moto per le guide</p>
</div>

<div class="card">
<img src="foto-segreteria.jpg" alt="Segreteria">
<h3>Sarah, Chiara e Max</h3>
<p>In ufficio per gestire tutte le vostre pratiche</p>
</div>

</div>
</section>

<script>
const faders = document.querySelectorAll('.fade');
window.addEventListener('scroll', () => {
  faders.forEach(el => {
    if(el.getBoundingClientRect().top < window.innerHeight - 100){
      el.classList.add('show');
    }
  });
});
</script>

</body>
</html>
